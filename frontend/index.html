<!DOCTYPE html>
<html>
<head>
  <title>Zetiify VC Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; background: #f4f6fb; margin: 0; }
    .container { padding: 30px; text-align: center; }
    .card { background: white; padding: 20px; margin: auto; width: 400px; border-radius: 10px; }
    input { width: 100%; padding: 10px; margin: 10px 0; }
    button { padding: 10px; margin: 5px; background: #6c63ff; color: white; border: none; }
    .result { background: white; margin: 10px auto; padding: 15px; width: 400px; border-left: 5px solid #6c63ff; }
  </style>
</head>

<body>

<div class="container">

  <h1>Zetiify</h1>

  <div class="card">
    <input id="name" placeholder="Startup Name">
    <input id="traction" placeholder="Traction">
    <input id="team" placeholder="Team">
    <input id="market" placeholder="Market">
    <input id="product" placeholder="Product">

    <button onclick="addStartup()">Add Startup</button>
  </div>

  <div id="results"></div>

</div>

<script>

async function addStartup() {

  const data = {
    name: name.value,
    traction: +traction.value,
    team: +team.value,
    market: +market.value,
    product: +product.value
  };

  const res = await fetch("/api/startup", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });

  loadStartups();
}

async function loadStartups() {

  const res = await fetch("/api/startups");
  const startups = await res.json();

  document.getElementById("results").innerHTML = "";

  startups.forEach(s => {
    document.getElementById("results").innerHTML += `
      <div class="result">
        <h3>${s.name}</h3>
        <p>Score: ${s.score}</p>
        <p>Decision: ${s.decision}</p>

        <button onclick="updateDecision('${s._id}','INVEST')">Invest</button>
        <button onclick="updateDecision('${s._id}','PASS')">Pass</button>
      </div>
    `;
  });
}

async function updateDecision(id, decision) {
  await fetch("/api/startup/" + id, {
    method: "PUT",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ decision })
  });

  loadStartups();
}

window.onload = loadStartups;

</script>

</body>
</html>
