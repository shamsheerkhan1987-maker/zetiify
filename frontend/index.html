<!DOCTYPE html>
<html>
<head>
  <title>Zetiify</title>
</head>
<body>

<h1>Zetiify Login</h1>

<input type="text" id="email" placeholder="Email" value="investor@zetiify.com"><br><br>
<input type="password" id="password" placeholder="Password" value="123456"><br><br>

<button onclick="login()">Login</button>

<h2 id="status"></h2>
<div id="deals"></div>

<script>
async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  const res = await fetch("/api/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  if (!res.ok) {
    document.getElementById("status").innerText = "❌ Login failed";
    return;
  }

  document.getElementById("status").innerText = "✅ Login successful";

  loadDeals();
}

async function loadDeals() {
  const res = await fetch("/api/deals");
  const data = await res.json();

  let html = `
    <h2>Investor Deals</h2>
    <table border="1" cellpadding="10">
      <tr>
        <th>Name</th>
        <th>Score</th>
        <th>Stage</th>
        <th>Ask</th>
      </tr>
  `;

  data.forEach(d => {
    html += `
      <tr>
        <td>${d.name}</td>
        <td>${d.score}</td>
        <td>${d.stage}</td>
        <td>${d.ask}</td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("deals").innerHTML = html;
}
</script>

</body>
</html>
